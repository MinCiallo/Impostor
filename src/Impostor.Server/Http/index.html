<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Impostor Server</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a2e;
            color: #eee;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
        }
        .container {
            background: #16213e;
            padding: 48px;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
            max-width: 500px;
        }
        h1 { font-size: 28px; margin-bottom: 16px; color: #e94560; }
        p { font-size: 16px; line-height: 1.6; margin-bottom: 12px; color: #a0a0b8; }
        a { color: #0f3460; background: #e94560; padding: 10px 24px; border-radius: 8px;
            text-decoration: none; display: inline-block; margin-top: 16px; font-weight: 600; }
        a:hover { background: #c73652; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Impostor is running</h1>
        <p>Please configure your Among Us to connect to a game.</p>
        <p>To generate a region file, go to:</p>
        <a href="https://impostor.github.io/Impostor" target="_blank">Generate Region File</a>
    </div>
</body>
</html>
